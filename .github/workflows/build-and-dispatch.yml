name: Build and dispatch

# Builds the music image (FastAPI backend + bundled React SPA) and
# fires repository_dispatch at the infra repo to trigger a deploy.
#
# Required secret  : INFRA_DISPATCH_TOKEN  (fine-grained PAT on the infra repo)
# Required variable: INFRA_REPO            (e.g. pjunak/junak.eu)
# Required variable: INFRA_SERVICE         (e.g. music)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate production deploys on the backend + frontend test/lint suites: the
  # build/push and infra dispatch only run if these pass.
  verify:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend lint and tests
        run: |
          cd backend
          pip install -e .[dev]
          ruff check app tests
          pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend lint, typecheck, and tests
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run typecheck
          npm run test

  build:
    name: Build and push image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        env:
          REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch:
    name: Dispatch deploy to infra repo
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verify dispatch config
        env:
          TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          REPO: ${{ vars.INFRA_REPO }}
          SERVICE: ${{ vars.INFRA_SERVICE }}
        run: |
          set -euo pipefail
          : "${TOKEN:?INFRA_DISPATCH_TOKEN secret is not set}"
          : "${REPO:?INFRA_REPO variable is not set (e.g. owner/infra-repo)}"
          : "${SERVICE:?INFRA_SERVICE variable is not set (e.g. music)}"

      - name: Trigger infra deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: ${{ vars.INFRA_REPO }}
          event-type: deploy
          client-payload: |-
            {
              "service": "${{ vars.INFRA_SERVICE }}",
              "sha": "${{ github.sha }}"
            }
